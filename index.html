<!DOCTYPE html>
<html lang="en">
  <head>
    <title>GrainTrain</title>
    <link rel="stylesheet" type="text/css" href="style.css">
    <link rel="icon" href="data:,">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <script src="js/three.min.js"></script>
    <script src="js/waveformpath.js"></script>
    <script src="js/simplify.js"></script>
    <script src="js/granulator.js"></script>
    <script src="js/mouse.js"></script>
    <script src="js/touch.js"></script>
  </head>

  <body>
    <div id = "globalContainer">

    <div id="sliderArray">

    <div class="sliderContainer">
        <div class="sliderLabel" id="pitchLabel">PITCH <span id="myText">1</span></div>
        <div class="sliderMarkerContainer">
            <input type="range" min="0" max="100" value="50" class="slider" id="pitchSlider">
            <div class="globalMarker" id="pitchMarker"></div>
        </div>
    </div>

    <div class="sliderContainer">
        <div class="sliderLabel" id="sizeLabel">SIZE</div>
        <div class="sliderMarkerContainer">
            <input type="range" min="1" max="100" value="50" class="slider" id="sizeSlider">
            <div class="globalMarker" id="sizeMarker"></div>
        </div>
    </div>

    <div class="sliderContainer">
        <div class="sliderLabel" id="densityLabel">DENSITY</div>
        <div class="sliderMarkerContainer">
            <input type="range" min="0" max="100" value="50" class="slider" id="densitySlider">
            <div class="globalMarker" id="densityMarker"></div>
        </div>
    </div>

    <div class="sliderContainer">
        <div class="sliderLabel" id="spreadLabel">SPREAD</div>
        <div class="sliderMarkerContainer">
            <input type="range" min="1" max="10" step="0.1" value="4" class="slider" id="spreadSlider">
            <div class="globalMarker" id="spreadMarker"></div>
        </div>
    </div>

    <div class="sliderContainer">
        <div class="sliderLabel" id="filterLabel">FILTER</div>
        <div class="sliderMarkerContainer">
            <input type="range" min="0" max="100" value="0" class="slider" id="filterSlider">
            <div class="globalMarker" id="filterMarker"></div>
        </div>
    </div>

    <div class="sliderContainer">
        <div class="sliderLabel" id="reverbLabel">REVERB</div>
        <div class="sliderMarkerContainer">
            <input type="range" min="0" max="100" value="0" class="slider" id="reverbSlider">
            <div class="globalMarker" id="reverbMarker"></div>
        </div>
    </div>

    <div class="sliderContainer">
        <div class="sliderLabel" id="volumeLabel">VOLUME</div>
        <div class="sliderMarkerContainer">
            <input type="range" min="0" max="100" value="71" class="slider" id="volumeSlider">
            <div class="globalMarker" id="volumeMarker"></div>
        </div>
    </div>

    </div>

    <input type="file" id="audio-file">
    <input type="file" id="state-file" accept=".graintrain">
    
    <div class="buttonArray">
      <div class="buttonContainer">
          <div class="buttonLabel">ADD</div>
          <div id="drawInstruction" class="instructionLabel">SELECT A SOUND FILE AND DRAW A PATH</div>
          <div class="button" id="add" onclick="toggleAddMode()"><img src='assets/add.png' height="30px" width="30px"></img></div>
      </div>

      <div class="buttonContainer">
          <div class="buttonLabel">MOVE</div>
          <div class="button" id="move" onclick="toggleMoveMode()"><img src='assets/move.png' height="30px" width="30px"></img></div>
      </div>

      <div class="buttonContainer">
          <div class="buttonLabel">DUPLICATE</div>
          <div class="button" id="duplicate" onclick="toggleDuplicateMode()"><img src='assets/duplicate.png' height="30px" width="30px"></img></div>
      </div>

      <div class="buttonContainer">
          <div class="buttonLabel">DELETE</div>
          <div class="button" id="delete" onclick="toggleDeleteMode()"><img src='assets/remove.png' height="30px" width="30px"></img></div>
      </div>

      <div class="buttonContainer">
          <div class="buttonLabel" id="scopeLabel">GLOBAL<br>CONTROL</div>
          <div class="button" id="scopeButton"><img src='assets/scope.png' height="30px" width="30px"></img></div>
      </div>

      <div class="buttonContainer">
          <div class="buttonLabel">SAVE</div>
          <div class="button" id="save" onclick="saveState()"><img src='assets/save.png' height="30px" width="30px"></img></div>
      </div>

      <div class="buttonContainer">
          <div class="buttonLabel">LOAD</div>
          <div class="button" id="load" onclick="loadState()"><img src='assets/load.png' height="30px" width="30px"></img></div>
      </div>

    </div>

    <script>

      var data;
      var voices = [];
      var waveformPaths = [];

      var container, controls, camara, scene, renderer;
      var waveformPath;
      var gridLines, plusLines;

      var intersected;
      var currentlyIntersecting;
      var previouslyIntersected = [];
      var intersectedParents = [];
      var previouslyIntersectedParents = [];
      var draggedObject = null;

      var highlightRange = 4;

      var fileInput = document.getElementById('audio-file');

      var moveMode = false;
      var deleteMode = false;
      var addMode = false;
      var duplicateMode = false;

      var mousePressed = false;
      var isTouchInterface = false;

      var currentBuffer;
      var context, master;
      window.AudioContext = window.AudioContext || window.webkitAudioContext || window.mozAudioContext || window.oAudioContext;
      var lowPassFilter;
      var reverb, dryGain, wetGain;
      var limiter;

      var localMode = false;
      var lastInteractedWave = null;
      var sliderOwner = null;
      var localSliderIDs = ['pitchLabel', 'sizeLabel', 'densityLabel', 'spreadLabel', 'filterLabel', 'reverbLabel', 'volumeLabel'];

      var pitchSlider = document.getElementById("pitchSlider");
      pitch = pitchSlider.value / 50;
      var sizeSlider = document.getElementById("sizeSlider");
      attack = sizeSlider.value / 200;
      release = sizeSlider.value / 200;
      var densitySlider = document.getElementById("densitySlider");
      density = densitySlider.value / 100;
      var filterSlider = document.getElementById("filterSlider");
      filterCutOff = logarithmicSlider(100 - filterSlider.value);

      var volumeSlider = document.getElementById("volumeSlider");
      var globalFilterValue = parseFloat(filterSlider.value);
      var globalReverbValue = parseFloat(reverbSlider.value);
      var globalVolumeSliderValue = parseFloat(volumeSlider.value);
      var normalized = globalVolumeSliderValue / 100;
      amp = Math.pow(normalized, 2) / 3;

      var isSafari = false;

      pitchSlider.oninput = function() {
          var newPitch;
          if(pitchSlider.value <= 45){
              newPitch = pitchSlider.value / 100 + 0.5;
          } else if(pitchSlider.value >= 55){
              newPitch = pitchSlider.value / 50;
          } else {
              newPitch = 1;
          }

          if(localMode){
              var activeParents = getActiveTouchedParents();
              for(var i = 0; i < activeParents.length; i++){
                  activeParents[i].params.pitchOffset = newPitch / pitch;
              }
          } else {
              pitch = newPitch;
              updateGlobalMarkers();
          }
          document.getElementById("myText").innerHTML = Number(newPitch.toString().match(/^\d+(?:\.\d{0,2})?/));
      }

      sizeSlider.oninput = function() {
          var newAttack = sizeSlider.value / 200;
          var newRelease = sizeSlider.value / 200;

          if(localMode){
              var activeParents = getActiveTouchedParents();
              for(var i = 0; i < activeParents.length; i++){
                  activeParents[i].params.attackOffset = newAttack - attack;
                  activeParents[i].params.releaseOffset = newRelease - release;
              }
          } else {
              attack = newAttack;
              release = newRelease;
              updateGlobalMarkers();
          }
      }

      densitySlider.oninput = function() {
          var newDensity = densitySlider.value / 100;

          if(localMode){
              var activeParents = getActiveTouchedParents();
              for(var i = 0; i < activeParents.length; i++){
                  activeParents[i].params.densityOffset = newDensity - density;
              }
          } else {
              density = newDensity;
              updateGlobalMarkers();
          }
      }

      spreadSlider.oninput = function() {
          var newSpread = spreadSlider.value / 1;

          if(localMode){
              var activeParents = getActiveTouchedParents();
              for(var i = 0; i < activeParents.length; i++){
                  activeParents[i].params.spreadOffset = newSpread - highlightRange;
              }
          } else {
              highlightRange = newSpread;
              updateGlobalMarkers();
          }
      }

      filterSlider.oninput = function() {
          var v = parseFloat(filterSlider.value); // 0..100

          if(localMode){
              var activeParents = getActiveTouchedParents();
              for(var i = 0; i < activeParents.length; i++){
                  // offset in slider space
                  activeParents[i].params.filterOffset = v - globalFilterValue;

                  var actual = Math.max(0, Math.min(100, globalFilterValue + activeParents[i].params.filterOffset));
                  activeParents[i].trainFilter.frequency.value = logarithmicSlider(100 - actual);
              }
          } else {
              globalFilterValue = v;

              // update all trains
              for(var i = 0; i < scene.children.length; i++){
                  var w = scene.children[i];
                  if(w.trainFilter && w.params){
                      var actual = Math.max(0, Math.min(100, globalFilterValue + w.params.filterOffset));
                      w.trainFilter.frequency.value = logarithmicSlider(100 - actual);
                  }
              }
          }

          // keep markers in sync if you’re showing them
          updateGlobalMarkers();
      };

      reverbSlider.oninput = function() {
          var reverbValue = reverbSlider.value;

          if(localMode){
              var activeParents = getActiveTouchedParents();
              for(var i = 0; i < activeParents.length; i++){
                  activeParents[i].params.reverbOffset = reverbValue - globalReverbValue;
                  var actualReverb = Math.max(0, Math.min(100, globalReverbValue + activeParents[i].params.reverbOffset));
                  activeParents[i].trainDry.gain.value = 1 - actualReverb / 100;
                  activeParents[i].trainWet.gain.value = actualReverb / 100;
              }
          } else {
              globalReverbValue = reverbValue;
              for(var i = 0; i < scene.children.length; i++){
                  var child = scene.children[i];
                  if(child.trainDry){
                      var actualReverb = Math.max(0, Math.min(100, globalReverbValue + (child.params ? child.params.reverbOffset : 0)));
                      child.trainDry.gain.value = 1 - actualReverb / 100;
                      child.trainWet.gain.value = actualReverb / 100;
                  }
              }
          }
      }

      volumeSlider.oninput = function() {
          if(localMode){
              var activeParents = getActiveTouchedParents();
              for(var i = 0; i < activeParents.length; i++){
                  activeParents[i].params.volumeOffset = parseFloat(volumeSlider.value) - globalVolumeSliderValue;
                  var actualSliderValue = Math.max(0, Math.min(100, globalVolumeSliderValue + activeParents[i].params.volumeOffset));
                  var normalizedActual = actualSliderValue / 100;
                  var actualAmp = Math.pow(normalizedActual, 2) / 3;
                  var normalizedGlobal = globalVolumeSliderValue / 100;
                  var globalAmp = Math.pow(normalizedGlobal, 2) / 3;
                  activeParents[i].trainVolume.gain.value = globalAmp > 0 ? actualAmp / globalAmp : 1;
              }
          } else {
              globalVolumeSliderValue = parseFloat(volumeSlider.value);
              var normalized = globalVolumeSliderValue / 100;
              amp = Math.pow(normalized, 2) / 3;
              for(var i = 0; i < scene.children.length; i++){
                  var child = scene.children[i];
                  if(child.trainVolume && child.params){
                      var actualSliderValue = Math.max(0, Math.min(100, globalVolumeSliderValue + child.params.volumeOffset));
                      var normalizedActual = actualSliderValue / 100;
                      var actualAmp = Math.pow(normalizedActual, 2) / 3;
                      child.trainVolume.gain.value = amp > 0 ? actualAmp / amp : 1;
                  }
              }
          }
      }

      var loadImpulse = function(){

        var request = new XMLHttpRequest();
        request.open( "GET", 'assets/ir.wav', true );
        request.responseType = "arraybuffer";
        request.onload = function (){
          context.decodeAudioData( request.response, function ( buffer ) {
            reverb.buffer = buffer;
          }, function ( e ) {
            //console.log( e );
          } );
        };request.onerror = function ( e ){
            //console.log( e );
          };
        request.send();
      };

      init();
      render();

      function toggleParamScope(){

          // cancel other modes
          if(addMode){
              addMode = false;
              document.getElementById('drawInstruction').style.display = 'none';
              renderer.setClearColor(0xf0f0f0);
              document.getElementById('add').style.background = "#FF5E89";
          }
          if(moveMode){
              moveMode = false;
              document.getElementById('move').style.background = "#FF5E89";
          }
          if(duplicateMode){
              duplicateMode = false;
              document.getElementById('duplicate').style.background = "#FF5E89";
          }
          if(deleteMode){
              deleteMode = false;
              document.getElementById('delete').style.background = "#FF5E89";
          }

          if(localMode){
              localMode = false;
              sliderOwner = null;

              document.getElementById('scopeLabel').innerHTML = 'GLOBAL<br>CONTROL';

              loadGlobalToSliders();
              updateGlobalMarkers();

              for(var i = 0; i < localSliderIDs.length; i++){
                  document.getElementById(localSliderIDs[i]).classList.remove('local');
              }

              var localSliders = ['pitchSlider', 'sizeSlider', 'densitySlider', 'spreadSlider', 'filterSlider', 'reverbSlider', 'volumeSlider'];
              for(var i = 0; i < localSliders.length; i++){
                  document.getElementById(localSliders[i]).classList.remove('localSlider');
              }
          } else {
              localMode = true;

              document.getElementById('scopeLabel').innerHTML = 'LOCAL<br>CONTROL';

              if(lastInteractedWave && lastInteractedWave.params){
                  sliderOwner = lastInteractedWave;
                  loadParamsToSliders(sliderOwner.params);
              }

              updateGlobalMarkers();

              for(var i = 0; i < localSliderIDs.length; i++){
                  document.getElementById(localSliderIDs[i]).classList.add('local');
              }

              var localSliders = ['pitchSlider', 'sizeSlider', 'densitySlider', 'spreadSlider', 'filterSlider', 'reverbSlider', 'volumeSlider'];
              for(var i = 0; i < localSliders.length; i++){
                  document.getElementById(localSliders[i]).classList.add('localSlider');
              }
          }
      }

      function loadParamsToSliders(params){
          var actualPitch = Math.max(0.5, Math.min(2, pitch * params.pitchOffset));
          if(actualPitch <= 1){
              pitchSlider.value = (actualPitch - 0.5) * 100;
          } else {
              pitchSlider.value = actualPitch * 50;
          }
          document.getElementById("myText").innerHTML = Number(actualPitch.toString().match(/^\d+(?:\.\d{0,2})?/));

          var actualAttack = Math.max(0.005, Math.min(0.5, attack + params.attackOffset));
          sizeSlider.value = actualAttack * 200;

          var actualDensity = Math.max(0, Math.min(1, density + params.densityOffset));
          densitySlider.value = actualDensity * 100;

          var actualSpread = Math.max(1, Math.min(10, highlightRange + params.spreadOffset));
          spreadSlider.value = actualSpread;

          var actualFilter = Math.max(0, Math.min(100, globalFilterValue + params.filterOffset));
          filterSlider.value = actualFilter;

          var actualReverb = Math.max(0, Math.min(100, globalReverbValue + params.reverbOffset));
          reverbSlider.value = actualReverb;

          var actualAmp = Math.max(0, amp + params.volumeOffset);
          volumeSlider.value = Math.sqrt(actualAmp * 3) * 100;
          var actualSliderValue = Math.max(0, Math.min(100, globalVolumeSliderValue + params.volumeOffset));
          volumeSlider.value = actualSliderValue;
      }

      function loadGlobalToSliders(){
          if(pitch <= 1){
              pitchSlider.value = (pitch - 0.5) * 100;
          } else {
              pitchSlider.value = pitch * 50;
          }
          document.getElementById("myText").innerHTML = Number(pitch.toString().match(/^\d+(?:\.\d{0,2})?/));
          sizeSlider.value = attack * 200;
          densitySlider.value = density * 100;
          spreadSlider.value = highlightRange;
          filterSlider.value = globalFilterValue;
          reverbSlider.value = globalReverbValue;
          var normalized = volumeSlider.value / 100;
          volumeSlider.value = globalVolumeSliderValue;
      }

      function updateGlobalMarkers(){
          if(!localMode){
              document.getElementById('pitchMarker').style.display = 'none';
              document.getElementById('sizeMarker').style.display = 'none';
              document.getElementById('densityMarker').style.display = 'none';
              document.getElementById('spreadMarker').style.display = 'none';
              document.getElementById('filterMarker').style.display = 'none';
              document.getElementById('reverbMarker').style.display = 'none';
              document.getElementById('volumeMarker').style.display = 'none';
              return;
          }

          positionMarker('pitchSlider', 'pitchMarker', getGlobalPitchSliderValue());
          positionMarker('sizeSlider', 'sizeMarker', attack * 200);
          positionMarker('densitySlider', 'densityMarker', density * 100);
          positionMarker('spreadSlider', 'spreadMarker', highlightRange);
          positionMarker('filterSlider', 'filterMarker', globalFilterValue);
          positionMarker('reverbSlider', 'reverbMarker', globalReverbValue);
          positionMarker('volumeSlider', 'volumeMarker', globalVolumeSliderValue);
      }

      function getGlobalPitchSliderValue(){
          if(pitch <= 1){
              return (pitch - 0.5) * 100;
          } else {
              return pitch * 50;
          }
      }

      function positionMarker(sliderID, markerID, globalValue){
          var slider = document.getElementById(sliderID);
          var marker = document.getElementById(markerID);
          var min = parseFloat(slider.min);
          var max = parseFloat(slider.max);
          var percent = (globalValue - min) / (max - min);
          percent = Math.max(0, Math.min(1, percent));

          // Always position in the slider's own coordinate space
          // (before any CSS rotation)
          var thumbHalf = 12.5;
          var trackWidth = slider.offsetWidth - 25;
          var position = thumbHalf + percent * trackWidth;

          marker.style.display = 'block';
          marker.style.left = position + 'px';
          marker.style.top = '0px';
          marker.style.height = slider.offsetHeight + 'px';
          marker.style.width = '8px';
          marker.style.transform = 'translateX(-50%)';
      }

      function getActiveTouchedParents(){
          var parents = [];
          var seen = {};

          // From touch interactions
          for(var i = 0; i < touches.length; i++){
              for(var key in touches[i].voices){
                  if(touches[i].voices[key].isPlaying){
                      var parent = touches[i].voices[key].intersectedBlock.parent;
                      if(!seen[parent.uuid]){
                          seen[parent.uuid] = true;
                          parents.push(parent);
                      }
                  }
              }
          }

          // From mouse interactions
          for(var j = 0; j < previouslyIntersectedParents.length; j++){
              var parent = previouslyIntersectedParents[j];
              if(parent.buffer && !seen[parent.uuid]){
                  seen[parent.uuid] = true;
                  parents.push(parent);
              }
          }

          // Fallback to last interacted if nothing currently active
          if(parents.length === 0 && lastInteractedWave && lastInteractedWave.params){
              parents.push(lastInteractedWave);
          }

          return parents;
      }

      function toggleAddMode(){

        if(addMode){
          addMode = false;
          document.getElementById('drawInstruction').style.display = 'none';
          renderer.setClearColor(0xf0f0f0);
          document.getElementById('add').style.background = "#FF5E89";
        }else{
          context.resume();
          addMode = true;
          moveMode = false;
          deleteMode = false;
          duplicateMode = false;
          document.getElementById('drawInstruction').style.display = 'block';
          renderer.setClearColor(0xe8f0f1);
          document.getElementById('add').style.background = "#00CCFF";
          document.getElementById('move').style.background = "#FF5E89";
          document.getElementById('duplicate').style.background = "#FF5E89";
          document.getElementById('delete').style.background = "#FF5E89";
          document.getElementById('audio-file').click();
        }
      }

      function toggleMoveMode() {

        if(moveMode){
          moveMode = false;
          document.getElementById('move').style.background = "#FF5E89";
        }else{
          moveMode = true;
          deleteMode = false;
          addMode = false;
          duplicateMode = false;
          document.getElementById('move').style.background = "#00CCFF";
          document.getElementById('duplicate').style.background = "#FF5E89";
          document.getElementById('delete').style.background = "#FF5E89";
          document.getElementById('add').style.background = "#FF5E89";
        }
      }

      function toggleDuplicateMode(){

          if(duplicateMode){
              duplicateMode = false;
              document.getElementById('duplicate').style.background = "#FF5E89";
          } else {
              duplicateMode = true;
              moveMode = false;
              deleteMode = false;
              addMode = false;
              document.getElementById('duplicate').style.background = "#00CCFF";
              document.getElementById('add').style.background = "#FF5E89";
              document.getElementById('move').style.background = "#FF5E89";
              document.getElementById('delete').style.background = "#FF5E89";
          }
      }

      function toggleDeleteMode(){

        if(deleteMode){
          deleteMode = false;
          document.getElementById('delete').style.background = "#FF5E89";
        }else{
          deleteMode = true;
          moveMode = false;
          addMode = false;
          duplicateMode = false;
          document.getElementById('delete').style.background = "#00CCFF";
          document.getElementById('add').style.background = "#FF5E89";
          document.getElementById('move').style.background = "#FF5E89";
          document.getElementById('duplicate').style.background = "#FF5E89";
        }

      }

      function rebuildAudioContext(){

          var oldContext = context;

          context = new AudioContext({ latencyHint: 'playback' });

          master = context.createGain();

          limiter = context.createDynamicsCompressor();
          limiter.threshold.value = -1;
          limiter.knee.value = 1;
          limiter.ratio.value = 20;
          limiter.attack.value = 0.001;
          limiter.release.value = 0.05;

          reverb = context.createConvolver();
          loadImpulse();

          master.connect(limiter);
          limiter.connect(context.destination);
          reverb.connect(limiter);

          if(scheduler){
              scheduler.stop();
              scheduler = null;
          }
          grainPool = null;

          for(var i = 0; i < touches.length; i++){
              for(var key in touches[i].voices){
                  touches[i].voices[key].isPlaying = false;
              }
              touches[i].voices = {};
          }
          voices = [];

          // Rebuild per-train audio buses for existing trains
          for(var i = 0; i < scene.children.length; i++){
              var child = scene.children[i];
              if(child.buffer){
                  var trainBus = context.createGain();
                  var trainFilter = context.createBiquadFilter();
                  trainFilter.type = "lowpass";
                  var actualFilter = Math.max(0, Math.min(100, globalFilterValue + (child.params ? child.params.filterOffset : 0)));
                  trainFilter.frequency.value = logarithmicSlider(100 - actualFilter);
                  var trainVolume = context.createGain();
                  var actualSliderValue = Math.max(0, Math.min(100, globalVolumeSliderValue + (child.params ? child.params.volumeOffset : 0)));
                  var normalizedActual = actualSliderValue / 100;
                  var actualAmp = Math.pow(normalizedActual, 2) / 3;
                  trainVolume.gain.value = amp > 0 ? actualAmp / amp : 1;
                  var trainDry = context.createGain();
                  var trainWet = context.createGain();
                  var actualReverb = Math.max(0, Math.min(100, globalReverbValue + (child.params ? child.params.reverbOffset : 0)));
                  trainDry.gain.value = 1 - actualReverb / 100;
                  trainWet.gain.value = actualReverb / 100;

                  trainBus.connect(trainFilter);
                  trainFilter.connect(trainVolume);
                  trainVolume.connect(trainDry);
                  trainVolume.connect(trainWet);
                  trainDry.connect(limiter);
                  trainWet.connect(reverb);

                  child.bus = trainBus;
                  child.trainFilter = trainFilter;
                  child.trainVolume = trainVolume;
                  child.trainDry = trainDry;
                  child.trainWet = trainWet;
              }
          }

          try {
              oldContext.close();
          } catch(e) {}
      }

      function logarithmicSlider(position) {

        var minPosition = 0;
        var maxPosition = 100;
        var minValue = Math.log(100);
        var maxValue = Math.log(20000);
        var scale = (maxValue-minValue) / (maxPosition-minPosition);
        return Math.exp(minValue + scale*(position-minPosition));
      }

      function init() {

          container = document.createElement('div');
          document.body.appendChild(container);

          camera = new THREE.OrthographicCamera(
              window.innerWidth / -2, 
              window.innerWidth / 2, 
              window.innerHeight / 2, 
              window.innerHeight / -2, 
              -10000, 100000
          );
          camera.position.set(0, 0, 2000);

          scene = new THREE.Scene();
          scene.add(camera);
          
          buildGrid();

          var geometry = new THREE.PlaneGeometry(window.innerWidth * 10, window.innerHeight * 10);
          var material = new THREE.MeshBasicMaterial({ color: 0xffff00, side: THREE.DoubleSide });
          floor = new THREE.Mesh(geometry, material);
          waveformPath.setScene(scene);

          renderer = new THREE.WebGLRenderer({ antialias: true });
          renderer.setClearColor(0xf0f0f0);
          renderer.setPixelRatio(window.devicePixelRatio);
          renderer.setSize(window.innerWidth, window.innerHeight);
          container.appendChild(renderer.domElement);

          renderer.domElement.addEventListener( 'mousedown', onMouseDown, false );
          renderer.domElement.addEventListener( 'mouseup', onMouseUp, false );
          renderer.domElement.addEventListener( 'mousemove', onMouseMove, false );
          renderer.domElement.addEventListener( 'touchstart', onTouchStart, false );
          renderer.domElement.addEventListener( 'touchmove', onTouchMove, false );
          renderer.domElement.addEventListener( 'touchend', onTouchEnd, false );
          renderer.domElement.addEventListener( 'touchcancel', onTouchEnd, false);
          window.addEventListener('resize', onWindowResize, false);

          context = new AudioContext({ latencyHint: 'playback' });

          master = context.createGain();

          limiter = context.createDynamicsCompressor();
          limiter.threshold.value = -1;
          limiter.knee.value = 1;
          limiter.ratio.value = 20;
          limiter.attack.value = 0.001;
          limiter.release.value = 0.05;

          reverb = context.createConvolver();
          loadImpulse();

          master.connect(limiter);
          limiter.connect(context.destination);
          reverb.connect(limiter);

          document.addEventListener('visibilitychange', function(){
              if(document.visibilityState === 'visible'){
                  if(context.state === 'suspended'){
                      context.resume();
                  }
              }
          });

          fileInput.addEventListener('change', function() {
              let reader = new FileReader();
              reader.onload = function(ev) {
                  context.decodeAudioData(ev.target.result, function(buffer) {
                      currentBuffer = buffer;
                      data = buffer.getChannelData(0);
                  });
              };
              reader.readAsArrayBuffer(this.files[0]);
          }, false);

          var ua = navigator.userAgent;
          isSafari = /AppleWebKit/i.test(ua) && /Safari/i.test(ua) && 
                    !/CriOS|Chrome/i.test(ua) && !/FxiOS|Firefox/i.test(ua);

          if(isSafari){
              document.addEventListener('visibilitychange', function(){
                  if(document.visibilityState === 'visible'){
                      setTimeout(function(){
                          rebuildAudioContext();
                      }, 300);
                  }
              });
          }

          var scopeBtn = document.getElementById('scopeButton');

          scopeBtn.addEventListener('touchstart', function(e){
              e.preventDefault();   // prevents the follow-up synthetic click
              e.stopPropagation();  // prevents canvas handler
              toggleParamScope();
          }, { passive: false });

          scopeBtn.addEventListener('click', function(e){
              e.preventDefault();
              toggleParamScope();
          });

          animate();
      }

      function buildGrid(){

          var cellSize = 50;
          var plusEvery = 3;
          var markSize = 10;
          var cols = Math.ceil(window.innerWidth / cellSize) + 1;
          var rows = Math.ceil(window.innerHeight / cellSize) + 1;

          var gridVertices = [];
          var plusVertices = [];

          for (var col = 0; col < cols; col++) {
              var x = col * cellSize - window.innerWidth / 2;
              gridVertices.push(x, -window.innerHeight / 2, 0);
              gridVertices.push(x, window.innerHeight / 2, 0);
          }

          for (var row = 0; row < rows; row++) {
              var y = row * cellSize - window.innerHeight / 2;
              gridVertices.push(-window.innerWidth / 2, y, 0);
              gridVertices.push(window.innerWidth / 2, y, 0);
          }

          for (var row = 0; row < rows; row += plusEvery) {
              for (var col = 0; col < cols; col += plusEvery) {
                  var x = col * cellSize - window.innerWidth / 2;
                  var y = row * cellSize - window.innerHeight / 2;

                  plusVertices.push(x - markSize, y, 0);
                  plusVertices.push(x + markSize, y, 0);
                  plusVertices.push(x - markSize, y + 0.5, 0);
                  plusVertices.push(x + markSize, y + 0.5, 0);

                  plusVertices.push(x, y - markSize, 0);
                  plusVertices.push(x, y + markSize, 0);
                  plusVertices.push(x + 0.5, y - markSize, 0);
                  plusVertices.push(x + 0.5, y + markSize, 0);
              }
          }

          var gridGeo = new THREE.BufferGeometry();
          gridGeo.addAttribute('position', new THREE.BufferAttribute(new Float32Array(gridVertices), 3));

          gridLines = new THREE.LineSegments(gridGeo, new THREE.LineBasicMaterial({
              color: 0x00CCFF,
              opacity: 0.25,
              transparent: true
          }));
          gridLines.raycast = function(){};
          scene.add(gridLines);

          var plusGeo = new THREE.BufferGeometry();
          plusGeo.addAttribute('position', new THREE.BufferAttribute(new Float32Array(plusVertices), 3));

          plusLines = new THREE.LineSegments(plusGeo, new THREE.LineBasicMaterial({
              color: 0x00CCFF,
              opacity: 0.6,
              transparent: true
          }));
          plusLines.raycast = function(){};
          scene.add(plusLines);
      }

      function drawWave(path){

          var wave = new THREE.Object3D();
          var span = 8;
          var ampScalar = 50;
          var depth = 0;
          var numberOfNodes = path.getLength() / 10 * Math.sqrt(camera.zoom);
          var step = Math.ceil(data.length / numberOfNodes);
          var blockSpacing = path.getLength() / numberOfNodes;

          for (var i = 0; i < numberOfNodes - 1; i++) {
              var min = 1.0;
              var max = -1.0;

              for (j = 0; j < step; j++) {
                  var datum = data[(i * step) + j];
                  if (datum < min) min = datum;
                  else if (datum > max) max = datum;
              }

              var height = Math.max(5, (max - min) * ampScalar);
              var boxGeometry = new THREE.BoxBufferGeometry(depth, height, span);
              var boxMaterial = new THREE.MeshBasicMaterial({ color: 0x00ccff });
              var block = new THREE.Mesh(boxGeometry, boxMaterial);
              block.index = i;
              block.position.copy(path.getPointAt(i * 1 / numberOfNodes));
              block.lookAt(path.getPointAt((i + 1) * 1 / numberOfNodes));
              wave.add(block);
          }

          // Per-train audio bus
          var trainBus = context.createGain();

          var trainFilter = context.createBiquadFilter();
          trainFilter.type = "lowpass";
          trainFilter.frequency.value = logarithmicSlider(100 - globalFilterValue);

          var trainVolume = context.createGain();
          // per-train volume is a ratio on top of global amp (default = 1)
          trainVolume.gain.value = 1.0;

          var trainDry = context.createGain();
          var trainWet = context.createGain();
          trainDry.gain.value = 1 - globalReverbValue / 100;
          trainWet.gain.value = globalReverbValue / 100;

          trainBus.connect(trainFilter);
          trainFilter.connect(trainVolume);
          trainVolume.connect(trainDry);
          trainVolume.connect(trainWet);
          trainDry.connect(limiter);
          trainWet.connect(reverb);

          wave.bus = trainBus;
          wave.trainFilter = trainFilter;
          wave.trainVolume = trainVolume;
          wave.trainDry = trainDry;
          wave.trainWet = trainWet;

          wave.buffer = currentBuffer;
          wave.path = path;
          wave.params = {
              pitchOffset: 1,
              attackOffset: 0,
              releaseOffset: 0,
              densityOffset: 0,
              spreadOffset: 0,
              filterOffset: 0,
              reverbOffset: 0,
              volumeOffset: 0
          };
          scene.add(wave);
      }

      function duplicateWaveform(original){

          var clone = new THREE.Object3D();

          for(var i = 0; i < original.children.length; i++){
              var origChild = original.children[i];
              var boxGeometry = origChild.geometry.clone();
              var boxMaterial = origChild.material.clone();
              var block = new THREE.Mesh(boxGeometry, boxMaterial);
              block.index = origChild.index;
              block.position.copy(origChild.position);
              block.rotation.copy(origChild.rotation);
              block.scale.copy(origChild.scale);
              clone.add(block);
          }

          // Create new audio bus for clone
          var trainBus = context.createGain();
          var trainFilter = context.createBiquadFilter();
          trainFilter.type = "lowpass";
          trainFilter.frequency.value = original.trainFilter.frequency.value;
          var trainVolume = context.createGain();
          trainVolume.gain.value = original.trainVolume.gain.value;
          var trainDry = context.createGain();
          var trainWet = context.createGain();
          trainDry.gain.value = original.trainDry.gain.value;
          trainWet.gain.value = original.trainWet.gain.value;

          trainBus.connect(trainFilter);
          trainFilter.connect(trainVolume);
          trainVolume.connect(trainDry);
          trainVolume.connect(trainWet);
          trainDry.connect(limiter);
          trainWet.connect(reverb);

          clone.bus = trainBus;
          clone.trainFilter = trainFilter;
          clone.trainVolume = trainVolume;
          clone.trainDry = trainDry;
          clone.trainWet = trainWet;

          clone.buffer = original.buffer;
          clone.path = original.path;
          clone.voice = null;
          clone.position.copy(original.position);
          clone.params = JSON.parse(JSON.stringify(original.params));

          scene.add(clone);
          return clone;
      }

      function getScaledPointer(interactor){

        var pointer = new THREE.Vector2();
        pointer.set((interactor.clientX / window.innerWidth) * 2 - 1, - (interactor.clientY / window.innerHeight) * 2 + 1);
        return pointer;
      }

      function getInteractionPoint(scaledPointer){

        var raycaster = new THREE.Raycaster();
        raycaster.setFromCamera( scaledPointer, camera );

        var intersects = raycaster.intersectObject( floor );

        if(intersects.length > 0) {
          return intersects[0].point;
        }
      }

      function onWindowResize(){

          camera.left = window.innerWidth / -2;
          camera.right = window.innerWidth / 2;
          camera.top = window.innerHeight / 2;
          camera.bottom = window.innerHeight / -2;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);

          scene.remove(floor);
          var geometry = new THREE.PlaneGeometry(window.innerWidth * 10, window.innerHeight * 10);
          var material = new THREE.MeshBasicMaterial({ color: 0xffff00, side: THREE.DoubleSide });
          floor = new THREE.Mesh(geometry, material);

          scene.remove(gridLines);
          scene.remove(plusLines);
          buildGrid();

          // Collect waveforms to redraw
          var waveforms = [];
          for (var i = scene.children.length - 1; i >= 0; i--) {
              var child = scene.children[i];
              if (child.buffer && child.path) {
                  waveforms.push({
                      buffer: child.buffer,
                      path: child.path,
                      voice: child.voice,
                      position: child.position.clone(),
                      params: child.params ? JSON.parse(JSON.stringify(child.params)) : null
                  });
                  scene.remove(child);
                  i--;
              }
          }

          for (var j = 0; j < waveforms.length; j++) {
              currentBuffer = waveforms[j].buffer;
              data = waveforms[j].buffer.getChannelData(0);
              drawWave(waveforms[j].path);
              var newWave = scene.children[scene.children.length - 1];
              newWave.voice = waveforms[j].voice;
              newWave.position.copy(waveforms[j].position);
              if(waveforms[j].params) newWave.params = waveforms[j].params;
          }
          
          if(localMode) updateGlobalMarkers();
      }

      function animate() {

        requestAnimationFrame( animate );
        render();
      }

      function render() {

        renderer.render(scene, camera);
      }

      function audioBufferToWav(buffer){
          var numChannels = buffer.numberOfChannels;
          var sampleRate = buffer.sampleRate;
          var format = 1; // PCM
          var bitDepth = 16;

          var channels = [];
          for(var i = 0; i < numChannels; i++){
              channels.push(buffer.getChannelData(i));
          }

          var dataLength = channels[0].length * numChannels * (bitDepth / 8);
          var headerLength = 44;
          var totalLength = headerLength + dataLength;

          var arrayBuffer = new ArrayBuffer(totalLength);
          var view = new DataView(arrayBuffer);

          // WAV header
          writeString(view, 0, 'RIFF');
          view.setUint32(4, totalLength - 8, true);
          writeString(view, 8, 'WAVE');
          writeString(view, 12, 'fmt ');
          view.setUint32(16, 16, true);
          view.setUint16(20, format, true);
          view.setUint16(22, numChannels, true);
          view.setUint32(24, sampleRate, true);
          view.setUint32(28, sampleRate * numChannels * (bitDepth / 8), true);
          view.setUint16(32, numChannels * (bitDepth / 8), true);
          view.setUint16(34, bitDepth, true);
          writeString(view, 36, 'data');
          view.setUint32(40, dataLength, true);

          var offset = 44;
          for(var i = 0; i < channels[0].length; i++){
              for(var ch = 0; ch < numChannels; ch++){
                  var sample = Math.max(-1, Math.min(1, channels[ch][i]));
                  sample = sample < 0 ? sample * 0x8000 : sample * 0x7FFF;
                  view.setInt16(offset, sample, true);
                  offset += 2;
              }
          }

          return arrayBuffer;
      }

      function writeString(view, offset, string){
          for(var i = 0; i < string.length; i++){
              view.setUint8(offset + i, string.charCodeAt(i));
          }
      }

      function arrayBufferToBase64(buffer){
          var binary = '';
          var bytes = new Uint8Array(buffer);
          var chunkSize = 8192;
          for(var i = 0; i < bytes.length; i += chunkSize){
              var chunk = bytes.subarray(i, Math.min(i + chunkSize, bytes.length));
              binary += String.fromCharCode.apply(null, chunk);
          }
          return btoa(binary);
      }

      function base64ToArrayBuffer(base64){
          var binary = atob(base64);
          var bytes = new Uint8Array(binary.length);
          for(var i = 0; i < binary.length; i++){
              bytes[i] = binary.charCodeAt(i);
          }
          return bytes.buffer;
      }

			function saveState(){

					var stateData = {
							globalParams: {
									pitch: pitch,
									attack: attack,
									release: release,
									density: density,
									spread: highlightRange,
									filter: filterSlider.value,
									reverb: reverbSlider.value,
									amp: amp
							},
							buffers: {},
							grainTrains: []
					};

					// Build a map of unique buffers
					var bufferMap = {};

					for(var i = 0; i < scene.children.length; i++){
							var child = scene.children[i];
							if(child.buffer && child.path){

									// Use the buffer object itself as identity
									var bufferID = null;
									for(var id in bufferMap){
											if(bufferMap[id] === child.buffer){
													bufferID = id;
													break;
											}
									}

									if(bufferID === null){
											bufferID = 'buf_' + Object.keys(bufferMap).length;
											bufferMap[bufferID] = child.buffer;

											var wavData = audioBufferToWav(child.buffer);
											stateData.buffers[bufferID] = arrayBufferToBase64(wavData);
									}

									var pathPoints = [];
									var numPoints = 100;
									for(var j = 0; j <= numPoints; j++){
											var point = child.path.getPointAt(j / numPoints);
											pathPoints.push([point.x, point.y, point.z]);
									}

									var trainData = {
											bufferID: bufferID,
											pathPoints: pathPoints,
											position: {
													x: child.position.x,
													y: child.position.y,
													z: child.position.z
											}
									};

									if(child.params){
											trainData.params = JSON.parse(JSON.stringify(child.params));
									}

									stateData.grainTrains.push(trainData);
							}
					}

					var json = JSON.stringify(stateData);
					var blob = new Blob([json], { type: 'application/json' });
					var url = URL.createObjectURL(blob);

					var link = document.createElement('a');
					link.href = url;
					link.download = 'session.graintrain';
					link.click();

					URL.revokeObjectURL(url);
			}

      function loadState(){
        context.resume();
        document.getElementById('state-file').click();
      }

      document.getElementById('state-file').addEventListener('change', function(){
				var file = this.files[0];
				if(!file) return;

				context.resume();

				var reader = new FileReader();
				reader.onload = function(ev){
						var stateData = JSON.parse(ev.target.result);

						// Clear current state
						for(var i = scene.children.length - 1; i >= 0; i--){
								var child = scene.children[i];
								if(child.buffer){
										if(child.voice){
												if(typeof child.voice === 'object'){
														for(var key in child.voice){
																child.voice[key].stopVoice();
																child.voice[key].isPlaying = false;
														}
												}
										}
										scene.remove(child);
								}
						}
						voices = [];
						if(scheduler){
								scheduler.stop();
								scheduler = null;
						}
						grainPool = null;

						// Restore global params
						var gp = stateData.globalParams;
						pitch = gp.pitch;
						attack = gp.attack;
						release = gp.release;
						density = gp.density;
						highlightRange = gp.spread;
						amp = gp.amp;

						if(pitch <= 1){
								pitchSlider.value = (pitch - 0.5) * 100;
						} else {
								pitchSlider.value = pitch * 50;
						}
						document.getElementById("myText").innerHTML = Number(pitch.toString().match(/^\d+(?:\.\d{0,2})?/));
						sizeSlider.value = attack * 200;
						densitySlider.value = density * 100;
						spreadSlider.value = highlightRange;
						filterSlider.value = gp.filter;
						lowPassFilter.frequency.value = logarithmicSlider(100 - gp.filter);
						reverbSlider.value = gp.reverb;
						dryGain.gain.value = 1 - gp.reverb / 100;
						wetGain.gain.value = gp.reverb / 100;
						volumeSlider.value = Math.sqrt(amp * 3) * 100;

						// Decode all unique buffers first, then build GrainTrains
						var decodedBuffers = {};
						var bufferIDs = Object.keys(stateData.buffers);
						var decodeCount = 0;

						if(bufferIDs.length === 0) return;

						for(var b = 0; b < bufferIDs.length; b++){
								(function(bufferID){
										var wavArrayBuffer = base64ToArrayBuffer(stateData.buffers[bufferID]);

										context.decodeAudioData(wavArrayBuffer, function(buffer){
												decodedBuffers[bufferID] = buffer;
												decodeCount++;

												// Once all buffers decoded, build all GrainTrains
												if(decodeCount === bufferIDs.length){
														buildGrainTrains(stateData, decodedBuffers);
												}
										}, function(error){
												console.log('Error decoding buffer:', bufferID, error);
												decodeCount++;
												if(decodeCount === bufferIDs.length){
														buildGrainTrains(stateData, decodedBuffers);
												}
										});
								})(bufferIDs[b]);
						}
				};
				reader.readAsText(file);

				this.value = '';
			}, false);

			function buildGrainTrains(stateData, decodedBuffers){

				for(var t = 0; t < stateData.grainTrains.length; t++){
						var trainData = stateData.grainTrains[t];
						var buffer = decodedBuffers[trainData.bufferID];

						if(!buffer) continue;

						currentBuffer = buffer;
						data = buffer.getChannelData(0);

						var vectors = [];
						for(var p = 0; p < trainData.pathPoints.length; p++){
								var pt = trainData.pathPoints[p];
								vectors.push(new THREE.Vector3(pt[0], pt[1], pt[2]));
						}
						var path = new THREE.CatmullRomCurve3(vectors);

						drawWave(path);

						var wave = scene.children[scene.children.length - 1];
						wave.position.set(
								trainData.position.x,
								trainData.position.y,
								trainData.position.z
						);

						if(trainData.params){
								wave.params = trainData.params;
						}

						waveformPaths.push(path);
				}
			}
