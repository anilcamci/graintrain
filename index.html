<!DOCTYPE html>
<html lang="en">
  <head>
    <title>GrainTrain</title>
    <link rel="stylesheet" type="text/css" href="style.css">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <script src="js/three.min.js"></script>
    <script src="js/SoundTrajectory.js"></script>
    <script src="js/simplify.js"></script>
    <script src="js/granulator.js"></script>
    <script src="js/OrthographicTrackballControls.js"></script>
  </head>

  <body>
    <div id = "globalContainer">

    <input type="file" id="audio-file">

    <button class="button" style="left:25%;" onclick="toggleAdding()">+</button>
    <button class="button" style="left:50%;" onclick="toggleEditing()"> </button>
    <button class="button" style="left:75%;" onclick="toggleDeleting()">–</button>

    <script>

      var data;
      var trajectories = [];
      var voices = [];

      var container, controls, camara, scene, renderer;
      var raycaster, mouse, pointer;
      var trajectory;

      var intersected;
      var previouslyIntersected = [];
      var draggedObject = null;

      var highlightRange = 4;

      var fileInput = document.getElementById('audio-file');

      var editMode = false;
      var deleteMode = false;
      var addMode = false;

      var mouseOffsetX;
      var mouseOffsetY;
      var mousePressed = false;

      var currentBuffer;

      init();
      render();

      function toggleAdding(){
        document.getElementById('audio-file').click();
        addMode = !addMode;
        deleteMode = false;
        editMode = false;
      }

      function toggleEditing() {
        editMode = !editMode;
        deleteMode = false;
        addMode = false
      }

      function toggleDeleting(){
        deleteMode = !deleteMode;
        addMode = false;
        editMode = false;
      }

      function init() {

        container = document.createElement( 'div' );
				document.body.appendChild( container );

        camera = new THREE.OrthographicCamera( window.innerWidth / - 2, window.innerWidth / 2, window.innerHeight / 2, window.innerHeight / - 2, -10000, 100000 );
        camera.position.set(0, 0, 2000);

        // controls = new THREE.OrthographicTrackballControls( camera );
        // controls.rotateSpeed = 0.0;
        // controls.zoomSpeed = 1.2;
        // controls.panSpeed = 0.8;
        // controls.noZoom = false;
        // controls.noPan = false;
        // controls.staticMoving = true;
        // controls.dynamicDampingFactor = 0.3;
        // controls.keys = [ 65, 83, 68 ];

				scene = new THREE.Scene();
        scene.add(camera);

        raycaster = new THREE.Raycaster();
        mouse = new THREE.Vector3();
        pointer = new THREE.Vector3();

        var geometry = new THREE.PlaneGeometry(window.innerWidth * 10, window.innerHeight * 10);
        var material = new THREE.MeshBasicMaterial( {color: 0xffff00, side: THREE.DoubleSide} );
        floor = new THREE.Mesh( geometry, material );
        trajectory.setScene(scene);

        renderer = new THREE.WebGLRenderer({antialias: true});
        renderer.setClearColor(0xf0f0f0);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        container.addEventListener( 'mousedown', onMouseDown, false );
        container.addEventListener( 'mouseup', onMouseUp, false );
        container.addEventListener( 'mousemove', onMouseMove, false );
        document.body.addEventListener( 'touchstart', onTouchStart, false);
        document.body.addEventListener( 'touchmove', onTouchMove, false);
        document.body.addEventListener( 'touchend', onTouchEnd, false);
        window.addEventListener( 'resize', onWindowResize, false );

        fileInput.addEventListener('change', function() {
          var reader = new FileReader();
          reader.onload = function(ev) {
            context.decodeAudioData(ev.target.result, function(buffer) {
              currentBuffer = buffer;
              data = buffer.getChannelData(0);
            });
          };
          reader.readAsArrayBuffer(this.files[0]);
        }, false);

        animate();
      }

      function drawWave(path){

        var wave = new THREE.Object3D();
        var rayWave = new THREE.Object3D();

        var span = 5;
        var ampScalar = 50;
        var depth = 0;
        var numberOfNodes = path.getLength() / 10 * Math.sqrt(camera.zoom);

        var step = Math.ceil( data.length / numberOfNodes );

        for( var i = 0; i < numberOfNodes-1; i++ ){
          var min = 1.0;
          var max = -1.0;

          for( j=0; j < step; j++) {
            var datum = data[(i*step)+j];
            if (datum < min){
              min = datum;
            }
            else if(datum > max){
              max = datum;
            }
          }

          var height = Math.max(5, (max-min)*ampScalar);

          var boxGeometry = new THREE.BoxBufferGeometry( depth, height, span );
          var boxMaterial = new THREE.MeshBasicMaterial({color: 0x00ccff});
          var block = new THREE.Mesh( boxGeometry, boxMaterial );
          block.index = i;
          block.position.copy(path.getPointAt(i * 1/numberOfNodes));
          block.lookAt(path.getPointAt((i +1) * 1/numberOfNodes));
          wave.add( block );
        }

        wave.buffer = currentBuffer;
        scene.add(wave);
      }

      function onMouseDown(event){

        document.getElementById('globalContainer').style.pointerEvents = 'none';

        mousePressed = true;

        getInteractionPoint(event);

        if( addMode ) trajectory.beginAt(mouse);

        if( editMode && intersected){ draggedObject = intersected.parent; setMouseOffset();}

        if( deleteMode ){
          scene.remove(intersected.parent);
          previouslyIntersected = [];
        }
      }

      function onMouseUp(event){

        document.getElementById('globalContainer').style.pointerEvents = 'auto';

        mousePressed = false;

        if(addMode){
          var obj = trajectory.createObject();
          trajectories.push(obj.spline);
          drawWave(obj.spline);
          addMode = false;
        }
      }

      function onMouseMove(event){

        getInteractionPoint(event);

        if( mousePressed && addMode) trajectory.addPoint(mouse);

        interactWithWave();
      }

      function onTouchStart(event){

        if ( event.touches.length === 1 ) {

          var touch = event.touches[0];

          getInteractionPoint(touch);

          if( addMode ) trajectory.beginAt(mouse);
          // var color = '#' + 'EE0000';
          // renderer.setClearColor(color);

          var intersects = raycaster.intersectObjects(scene.children, true);
          intersected = intersects[0];
          if( editMode && intersected){
            draggedObject = intersected.parent;
            setMouseOffset();
          }
        }
      }

      function onTouchMove(event){

        event.preventDefault();

        for(let touch in event.touches){

          // var touch = event.touches[0];

          getInteractionPoint(touch);

          if(addMode){
            trajectory.addPoint(mouse);
          }

          interactWithWave();
        }
      }

      function onTouchEnd(event){

        if(context.state !== "running"){
          context = createAudioContext();
          master = context.createGain();
          master.connect(context.destination);
        }

        if(addMode){
          var obj = trajectory.createObject();
          trajectories.push(obj.spline);
          drawWave(obj.spline);
          addMode = false;
        }
      }

      function getInteractionPoint(interactor){

        pointer.set((interactor.clientX / window.innerWidth) * 2 - 1, - (interactor.clientY / window.innerHeight) * 2 + 1);

        raycaster.setFromCamera( pointer, camera );

        var intersects = raycaster.intersectObject( floor );
        if(intersects.length > 0) {
            mouse = intersects[0].point;
        }
      }

      function interactWithWave(){
        var intersects = raycaster.intersectObjects(scene.children, true);

        if( editMode && mousePressed){
          const dx = mouse.x - mouseOffsetX;
          const dy = mouse.y - mouseOffsetY;
          mouseOffsetX = mouse.x;
          mouseOffsetY = mouse.y;
          draggedObject.position.x += dx;
          draggedObject.position.y += dy;
        }else if(!addMode){

          draggedObjectIndex = null;

          // Reset previously painted interactions
          for(var j = 0; j < previouslyIntersected.length; j++){

            previouslyIntersected[j].voice.stopVoice();

            for( var i = -highlightRange; i < highlightRange + 1; i++){
              var previousID = Math.max(Math.min(previouslyIntersected[j].index - i, previouslyIntersected[j].parent.children.length - 1), 0);
              previouslyIntersected[j].parent.children[previousID].material.color.setHex( 0x00ccff );
              previouslyIntersected[j].parent.children[previousID].scale.z = 1;
            }
          }

          // Paint the newly interacted objects
          for(var l = 0; l < intersects.length; l++){

            intersected = intersects[l].object;

            intersected.voice = new voice();
            intersected.voice.playVoice(intersected);

            for( var i = -highlightRange; i < highlightRange + 1; i++){
              var gradient = (highlightRange - Math.abs(i))/7;
              var ID = Math.max(Math.min(intersected.index - i, intersected.parent.children.length - 1), 0);
              intersected.parent.children[ID].material.color.setRGB( gradient*2, gradient*0.8, 0.655 );
              intersected.parent.children[ID].scale.z = 1.5 + gradient;
            }

            previouslyIntersected[l] = intersected;
          }

          intersectes = [];
        }
      }

      function setMouseOffset() {
        mouseOffsetX = mouse.x;
        mouseOffsetY = mouse.y;
      }

      function onWindowResize(){

        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      }

      function animate() {
        // controls.update();
        requestAnimationFrame( animate );
        render();
      }

      function render() {

        renderer.render(scene, camera);
      }

      function createAudioContext (desiredSampleRate) {
        var AudioCtor = window.AudioContext || window.webkitAudioContext

        desiredSampleRate = typeof desiredSampleRate === 'number'
          ? desiredSampleRate
          : 44100
        var context_ = new AudioCtor()

        // Check if hack is necessary. Only occurs in iOS6+ devices
        // and only when you first boot the iPhone, or play a audio/video
        // with a different sample rate
        if (/(iPhone|iPad)/i.test(navigator.userAgent) &&
            context_.sampleRate !== desiredSampleRate) {
          var buffer = context_.createBuffer(1, 1, desiredSampleRate)
          var dummy = context_.createBufferSource()
          dummy.buffer = buffer
          dummy.connect(context_.destination)
          dummy.start(0)
          dummy.disconnect()

          context_.close() // dispose old context
          context_ = new AudioCtor()
        }

        return context_
      }

      // function onMouseScroll(event){
      //
      //   if(camera.zoom > 0.5 && camera.zoom < 2.0){
      //     scene.children = [];
      //     for(var i in trajectories) drawWave(trajectories[i]);
      //   }
      // }

    </script>
    </div>
  </body>
</html>
