<!DOCTYPE html>
<html lang="en">
  <head>
    <title>GrainTrain</title>
    <link rel="stylesheet" type="text/css" href="style.css">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <script src="js/three.min.js"></script>
    <script src="js/waveformpath.js"></script>
    <script src="js/simplify.js"></script>
    <script src="js/granulator.js"></script>
    <script src="js/mouse.js"></script>
    <script src="js/touch.js"></script>
    <script src="js/gainprocessor.js"></script>
  </head>

  <body>
    <div id = "globalContainer">

    <div id="sliderArray">
      <div class="sliderContainer">
        <div class="sliderLabel">PITCH <span id="myText">1</span></div>
        <input type="range" min="0" max="100" value="50" class="slider" id="pitchSlider">       
      </div>

      <div class="sliderContainer">
        <div class="sliderLabel">SIZE</div>
        <input type="range" min="1" max="100" value="50" class="slider" id="sizeSlider">        
      </div>

      <div class="sliderContainer">
        <div class="sliderLabel">DENSITY</div>
        <input type="range" min="0" max="100" value="50" class="slider" id="densitySlider">
      </div>

      <div class="sliderContainer">
        <div class="sliderLabel">SPREAD</div>
        <input type="range" min="1" max="10" value="4" class="slider" id="spreadSlider">        
      </div>

      <div class="sliderContainer">
        <div class="sliderLabel">FILTER</div>
        <input type="range" min="0" max="100" value="0" class="slider" id="filterSlider">     
      </div>

      <div class="sliderContainer">
        <div class="sliderLabel">REVERB</div>
        <input type="range" min="0" max="100" value="0" class="slider" id="reverbSlider">        
      </div>

      <div class="sliderContainer">
        <div class="sliderLabel">VOLUME</div>
        <input type="range" min="0" max="100" value="50" class="slider" id="volumeSlider">        
      </div>

    </div>

    <input type="file" id="audio-file">
    <div class="buttonArray">
      <div class="buttonContainer">
        <div id="drawInstruction" class="instructionLabel">SELECT A SOUND FILE AND DRAW A PATH</div>
        <!-- <div class="buttonLabel">ADD</div> -->
        <div class="button" id="add" onclick="toggleAddMode()"><img src='assets/add.png' height="30px" width="30px"></img></div>
      </div>
      
      <div class="buttonContainer">
        <!-- <div class="buttonLabel">MOVE</div> -->
        <div class="button" id="move" onclick="toggleMoveMode()"><img src='assets/move.png' height="30px" width="30px"></img></div>
      </div>

      <div class="buttonContainer">
        <!-- <div class="buttonLabel">REMOVE</div> -->
        <div class="button" id="delete" onclick="toggleDeleteMode()"><img src='assets/remove.png' height="30px" width="30px"></img></div>
      </div>
      
      <div class="buttonContainer">
        <!-- <div class="buttonLabel">PANIC</div> -->
        <div class="button" id="reset" onclick="reset()"><img src='assets/panic.png' height="30px" width="30px"></img></div>
      </div>
    </div>

    <script>

      var data;
      var voices = [];
      var waveformPaths = [];

      var container, controls, camara, scene, renderer;
      var waveformPath;

      var intersected;
      var currentlyIntersecting;
      var previouslyIntersected = [];
      var intersectedParents = [];
      var previouslyIntersectedParents = [];
      var draggedObject = null;

      var highlightRange = 4;

      var fileInput = document.getElementById('audio-file');

      var moveMode = false;
      var deleteMode = false;
      var addMode = false;

      var mousePressed = false;
      var isTouchInterface = false;

      var currentBuffer;
      var context, master;
      window.AudioContext = window.AudioContext || window.webkitAudioContext || window.mozAudioContext || window.oAudioContext;
      var lowPassFilter;
      var reverb, dryGain, wetGain;
      var limiter;

      var pitchSlider = document.getElementById("pitchSlider");
      pitch = pitchSlider.value / 50;
      var sizeSlider = document.getElementById("sizeSlider");
      attack = sizeSlider.value / 200;
      release = sizeSlider.value / 200;
      var densitySlider = document.getElementById("densitySlider");
      density = densitySlider.value / 100;
      var filterSlider = document.getElementById("filterSlider");
      filterCutOff = logarithmicSlider(100 - filterSlider.value);
      var volumeSlider = document.getElementById("volumeSlider");
      amp = volumeSlider.value / 300;


      pitchSlider.oninput = function() {
          if(pitchSlider.value <= 45){
              pitch = pitchSlider.value/100 + 0.5;
          }else if(pitchSlider.value >= 55){
              pitch = pitchSlider.value/50;
          }else{
              pitch = 1;
          }
          document.getElementById("myText").innerHTML = Number(pitch.toString().match(/^\d+(?:\.\d{0,2})?/));
      }

      sizeSlider.oninput = function() {
        attack = sizeSlider.value / 200;
        release = sizeSlider.value / 200;
      }

      densitySlider.oninput = function() {
        density = densitySlider.value / 100;
      }

      spreadSlider.oninput = function() {
        highlightRange = spreadSlider.value / 1;
      }

      filterSlider.oninput = function() {
        lowPassFilter.frequency.value = logarithmicSlider(100 - filterSlider.value);
      }

      reverbSlider.oninput = function() {
        dryGain.gain.value = 1 - reverbSlider.value / 100;
        wetGain.gain.value = reverbSlider.value / 100;
      }

      volumeSlider.oninput = function() {
        amp = volumeSlider.value / 300;
      }

      var loadImpulse = function(){

        var request = new XMLHttpRequest();
        request.open( "GET", 'assets/ir.wav', true );
        request.responseType = "arraybuffer";
        request.onload = function (){
          context.decodeAudioData( request.response, function ( buffer ) {
            reverb.buffer = buffer;
          }, function ( e ) {
            //console.log( e );
          } );
        };request.onerror = function ( e ){
            //console.log( e );
          };
        request.send();
      };

      init();
      render();

      function toggleAddMode(){

        if(addMode){
          addMode = false;
          document.getElementById('drawInstruction').style.display = 'none';
          renderer.setClearColor(0xf0f0f0);
          document.getElementById('add').style.background = "#FF5E89";
        }else{
          context.resume();
          addMode = true;
          moveMode = false;
          deleteMode = false;
          document.getElementById('drawInstruction').style.display = 'block';
          renderer.setClearColor(0xe8f0f1);
          document.getElementById('add').style.background = "#00CCFF";
          document.getElementById('move').style.background = "#FF5E89";
          document.getElementById('delete').style.background = "#FF5E89";
          document.getElementById('audio-file').click();
        }
      }

      function toggleMoveMode() {

        if(moveMode){
          moveMode = false;
          document.getElementById('move').style.background = "#FF5E89";
        }else{
          moveMode = true;
          deleteMode = false;
          addMode = false;
          document.getElementById('move').style.background = "#00CCFF";
          document.getElementById('delete').style.background = "#FF5E89";
          document.getElementById('add').style.background = "#FF5E89";
        }

      }

      function toggleDeleteMode(){

        if(deleteMode){
          deleteMode = false;
          document.getElementById('delete').style.background = "#FF5E89";
        }else{
          deleteMode = true;
          moveMode = false;
          addMode = false;
          document.getElementById('delete').style.background = "#00CCFF";
          document.getElementById('add').style.background = "#FF5E89";
          document.getElementById('move').style.background = "#FF5E89";
        }

      }

      function reset() {

          if (scheduler) {
              scheduler.stop();
              scheduler = null;
          }

          for (i in voices) {
              voices[i].stopVoice();
          }
          voices = [];
          grainPool = null;

          context.close();
          context = new AudioContext({ latencyHint: 'playback' });

          master = context.createGain();

          lowPassFilter = context.createBiquadFilter();
          lowPassFilter.type = "lowpass";
          lowPassFilter.frequency.value = logarithmicSlider(100 - filterSlider.value);

          limiter = context.createDynamicsCompressor();
          limiter.threshold.value = -1;
          limiter.knee.value = 1;
          limiter.ratio.value = 20;
          limiter.attack.value = 0.001;
          limiter.release.value = 0.05;

          reverb = context.createConvolver();
          loadImpulse();
          dryGain = context.createGain();
          wetGain = context.createGain();
          dryGain.gain.value = 1 - reverbSlider.value / 100;
          wetGain.gain.value = reverbSlider.value / 100;

          master.connect(lowPassFilter);
          lowPassFilter.connect(dryGain);
          lowPassFilter.connect(wetGain);
          dryGain.connect(limiter);
          wetGain.connect(reverb);
          reverb.connect(limiter);
          limiter.connect(context.destination);

          fileInput.addEventListener('change', function() {
              let reader = new FileReader();
              reader.onload = function(ev) {
                  context.decodeAudioData(ev.target.result, function(buffer) {
                      currentBuffer = buffer;
                      data = buffer.getChannelData(0);
                  });
              };
              reader.readAsArrayBuffer(this.files[0]);
          }, false);
      }

      function logarithmicSlider(position) {

        var minPosition = 0;
        var maxPosition = 100;
        var minValue = Math.log(100);
        var maxValue = Math.log(20000);
        var scale = (maxValue-minValue) / (maxPosition-minPosition);
        return Math.exp(minValue + scale*(position-minPosition));
      }

      function init() {

          container = document.createElement('div');
          document.body.appendChild(container);

          camera = new THREE.OrthographicCamera(
              window.innerWidth / -2, 
              window.innerWidth / 2, 
              window.innerHeight / 2, 
              window.innerHeight / -2, 
              -10000, 100000
          );
          camera.position.set(0, 0, 2000);

          scene = new THREE.Scene();
          scene.add(camera);
          
          // Add a grid to the background
          var cellSize = 50;
          var plusEvery = 3;
          var markSize = 10;
          var cols = Math.ceil(window.innerWidth / cellSize) + 1;
          var rows = Math.ceil(window.innerHeight / cellSize) + 1;

          var gridVertices = [];
          var plusVertices = [];

          // Vertical lines
          for (var col = 0; col < cols; col++) {
              var x = col * cellSize - window.innerWidth / 2;
              gridVertices.push(x, -window.innerHeight / 2, 0);
              gridVertices.push(x, window.innerHeight / 2, 0);
          }

          // Horizontal lines
          for (var row = 0; row < rows; row++) {
              var y = row * cellSize - window.innerHeight / 2;
              gridVertices.push(-window.innerWidth / 2, y, 0);
              gridVertices.push(window.innerWidth / 2, y, 0);
          }

          // Plus signs
          for (var row = 0; row < rows; row += plusEvery) {
              for (var col = 0; col < cols; col += plusEvery) {
                  var x = col * cellSize - window.innerWidth / 2;
                  var y = row * cellSize - window.innerHeight / 2;

                  // Horizontal arm + offset copy
                  plusVertices.push(x - markSize, y, 0);
                  plusVertices.push(x + markSize, y, 0);
                  plusVertices.push(x - markSize, y + 0.5, 0);
                  plusVertices.push(x + markSize, y + 0.5, 0);

                  // Vertical arm + offset copy
                  plusVertices.push(x, y - markSize, 0);
                  plusVertices.push(x, y + markSize, 0);
                  plusVertices.push(x + 0.5, y - markSize, 0);
                  plusVertices.push(x + 0.5, y + markSize, 0);
              }
          }

          var gridGeo = new THREE.BufferGeometry();
          gridGeo.addAttribute('position', new THREE.BufferAttribute(new Float32Array(gridVertices), 3));

          var gridLines = new THREE.LineSegments(gridGeo, new THREE.LineBasicMaterial({
              color: 0x00CCFF,
              opacity: 0.25,
              transparent: true
          }));
          scene.add(gridLines);

          var plusGeo = new THREE.BufferGeometry();
          plusGeo.addAttribute('position', new THREE.BufferAttribute(new Float32Array(plusVertices), 3));

          var plusLines = new THREE.LineSegments(plusGeo, new THREE.LineBasicMaterial({
              color: 0x00CCFF,
              opacity: 0.6,
              transparent: true
          }));
          scene.add(plusLines);
          gridLines.raycast = function(){};
          plusLines.raycast = function(){};

          var geometry = new THREE.PlaneGeometry(window.innerWidth * 10, window.innerHeight * 10);
          var material = new THREE.MeshBasicMaterial({ color: 0xffff00, side: THREE.DoubleSide });
          floor = new THREE.Mesh(geometry, material);
          waveformPath.setScene(scene);

          renderer = new THREE.WebGLRenderer({ antialias: true });
          renderer.setClearColor(0xf0f0f0);
          renderer.setPixelRatio(window.devicePixelRatio);
          renderer.setSize(window.innerWidth, window.innerHeight);
          container.appendChild(renderer.domElement);

          renderer.domElement.addEventListener( 'mousedown', onMouseDown, false );
          renderer.domElement.addEventListener( 'mouseup', onMouseUp, false );
          renderer.domElement.addEventListener( 'mousemove', onMouseMove, false );
          renderer.domElement.addEventListener( 'touchstart', onTouchStart, false );
          renderer.domElement.addEventListener( 'touchmove', onTouchMove, false );
          renderer.domElement.addEventListener( 'touchend', onTouchEnd, false );
          window.addEventListener('resize', onWindowResize, false);

          context = new AudioContext({ latencyHint: 'playback' });

          master = context.createGain();

          lowPassFilter = context.createBiquadFilter();
          lowPassFilter.type = "lowpass";
          lowPassFilter.frequency.value = 20000;

          limiter = context.createDynamicsCompressor();
          limiter.threshold.value = -1;
          limiter.knee.value = 1;
          limiter.ratio.value = 20;
          limiter.attack.value = 0.001;
          limiter.release.value = 0.05;

          reverb = context.createConvolver();
          loadImpulse();
          dryGain = context.createGain();
          wetGain = context.createGain();
          dryGain.gain.value = 1;
          wetGain.gain.value = 0;

          master.connect(lowPassFilter);
          lowPassFilter.connect(dryGain);
          lowPassFilter.connect(wetGain);
          dryGain.connect(limiter);
          wetGain.connect(reverb);
          reverb.connect(limiter);
          limiter.connect(context.destination);

          fileInput.addEventListener('change', function() {
              let reader = new FileReader();
              reader.onload = function(ev) {
                  context.decodeAudioData(ev.target.result, function(buffer) {
                      currentBuffer = buffer;
                      data = buffer.getChannelData(0);
                  });
              };
              reader.readAsArrayBuffer(this.files[0]);
          }, false);

          animate();
      }

      function drawWave(path){

        var wave = new THREE.Object3D();
        var rayWave = new THREE.Object3D();

        var span = 8;
        var ampScalar = 50;
        var depth = 0;
        var numberOfNodes = path.getLength() / 10 * Math.sqrt(camera.zoom);

        var step = Math.ceil( data.length / numberOfNodes );

        for( var i = 0; i < numberOfNodes-1; i++ ){
          var min = 1.0;
          var max = -1.0;

          for( j=0; j < step; j++) {
            var datum = data[(i*step)+j];
            if (datum < min){
              min = datum;
            }
            else if(datum > max){
              max = datum;
            }
          }

          var height = Math.max(5, (max-min)*ampScalar);

          var boxGeometry = new THREE.BoxBufferGeometry( depth, height, span );
          var boxMaterial = new THREE.MeshBasicMaterial({color: 0x00ccff});
          var block = new THREE.Mesh( boxGeometry, boxMaterial );
          block.index = i;
          block.position.copy(path.getPointAt(i * 1/numberOfNodes));
          block.lookAt(path.getPointAt((i +1) * 1/numberOfNodes));
          wave.add( block );
        }

        wave.buffer = currentBuffer;
        scene.add(wave);
      }

      function getScaledPointer(interactor){

        var pointer = new THREE.Vector2();
        pointer.set((interactor.clientX / window.innerWidth) * 2 - 1, - (interactor.clientY / window.innerHeight) * 2 + 1);
        return pointer;
      }

      function getInteractionPoint(scaledPointer){

        var raycaster = new THREE.Raycaster();
        raycaster.setFromCamera( scaledPointer, camera );

        var intersects = raycaster.intersectObject( floor );

        if(intersects.length > 0) {
          return intersects[0].point;
        }
      }

      function onWindowResize(){

        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      }

      function animate() {

        requestAnimationFrame( animate );
        render();
      }

      function render() {

        renderer.render(scene, camera);
      }

    </script>
    </div>
  </body>
</html>
