<!DOCTYPE html>
<html lang="en">
  <head>
    <title>GrainTrain</title>
    <link rel="stylesheet" type="text/css" href="style.css">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <script src="js/three.min.js"></script>
    <script src="js/waveformpath.js"></script>
    <script src="js/simplify.js"></script>
    <script src="js/granulator.js"></script>
    <script src="js/mouse.js"></script>
    <script src="js/touch.js"></script>
  </head>

  <body>
    <div id = "globalContainer">

    <div id="drawInstruction" class="instructionLabel">SELECT A SOUND FILE </P> & DRAW A WAVEFORM</div>

    <div id="slideContainer">
      <input type="range" min="1" max="100" value="50" class="slider" id="pitchSlider" style="left:2.5%;">
      <div class="sliderLabel" style="left:2.8%;">pitch</div>
      <input type="range" min="1" max="100" value="50" class="slider" id="sizeSlider" style="left:22%;">
      <div class="sliderLabel" style="left:22.3%;">size</div>
      <input type="range" min="1" max="100" value="50" class="slider" id="volumeSlider" style="left:41.5%;">
      <div class="sliderLabel" style="left:41.8%;">volume</div>
      <input type="range" min="30" max="100" value="50" class="slider" id="densitySlider" style="left:61%;">
      <div class="sliderLabel" style="left:61.3%;">density</div>
      <input type="range" min="1" max="10" value="4" class="slider" id="spreadSlider" style="left:80.5%;">
      <div class="sliderLabel" style="left:80.8%;">spread</div>
    </div>

    <input type="file" id="audio-file">

    <div class="button" id="add" style="left:25%;" onclick="toggleAddMode()"><span>+</span></div>
    <div class="button" id="move" style="left:50%;" onclick="toggleMoveMode()"><img src='assets/move.png' height="30px" width="30px"></img></div>
    <div class="button" id="delete" style="left:75%;" onclick="toggleDeleteMode()"><span>–</span></div>

    <script>

      var data;
      var voices = [];
      var waveformPaths = [];

      var container, controls, camara, scene, renderer;
      var waveformPath;

      var intersected;
      var previouslyIntersected = [];
      var draggedObject = null;

      var highlightRange = 4;

      var fileInput = document.getElementById('audio-file');

      var moveMode = false;
      var deleteMode = false;
      var addMode = false;

      var mousePressed = false;
      var isTouchInterface = false;

      var currentBuffer;
      var context, master;
      window.AudioContext = window.AudioContext || window.webkitAudioContext || window.mozAudioContext || window.oAudioContext;

      var pitchSlider = document.getElementById("pitchSlider");
      pitch = pitchSlider.value / 50;
      var sizeSlider = document.getElementById("sizeSlider");
      attack = sizeSlider.value / 200;
      release = sizeSlider.value / 200;
      var volumeSlider = document.getElementById("volumeSlider");
      amp = volumeSlider.value / 200;
      var densitySlider = document.getElementById("densitySlider");
      density = densitySlider.value / 50;

      pitchSlider.oninput = function() {
        pitch = pitchSlider.value / 50;
      }

      sizeSlider.oninput = function() {
        attack = sizeSlider.value / 200;
        release = sizeSlider.value / 200;
      }

      volumeSlider.oninput = function() {
        amp = volumeSlider.value / 300;
      }

      densitySlider.oninput = function() {
        density = densitySlider.value / 50;
      }

      spreadSlider.oninput = function() {
        highlightRange = spreadSlider.value / 1;
      }

      init();
      render();

      function toggleAddMode(){
        if(addMode){
          addMode = false;
          document.getElementById('drawInstruction').style.display = 'none';
          renderer.setClearColor(0xf0f0f0);
          document.getElementById('add').style.background = "#FF5E89";
        }else{
          addMode = true;
          moveMode = false;
          deleteMode = false;
          document.getElementById('drawInstruction').style.display = 'block';
          renderer.setClearColor(0xe8f0f1);
          document.getElementById('add').style.background = "#00CCFF";
          document.getElementById('move').style.background = "#FF5E89";
          document.getElementById('delete').style.background = "#FF5E89";
          document.getElementById('audio-file').click();
        }
      }

      function toggleMoveMode() {
        if(moveMode){
          moveMode = false;
          document.getElementById('move').style.background = "#FF5E89";
        }else{
          moveMode = true;
          deleteMode = false;
          addMode = false;
          document.getElementById('move').style.background = "#00CCFF";
          document.getElementById('delete').style.background = "#FF5E89";
          document.getElementById('add').style.background = "#FF5E89";
        }

      }

      function toggleDeleteMode(){
        if(deleteMode){
          deleteMode = false;
          document.getElementById('delete').style.background = "#FF5E89";
        }else{
          deleteMode = true;
          moveMode = false;
          addMode = false;
          document.getElementById('delete').style.background = "#00CCFF";
          document.getElementById('add').style.background = "#FF5E89";
          document.getElementById('move').style.background = "#FF5E89";
        }

      }

      function init() {

        container = document.createElement( 'div' );
				document.body.appendChild( container );

        camera = new THREE.OrthographicCamera( window.innerWidth / - 2, window.innerWidth / 2, window.innerHeight / 2, window.innerHeight / - 2, -10000, 100000 );
        camera.position.set(0, 0, 2000);

				scene = new THREE.Scene();
        scene.add(camera);

        var geometry = new THREE.PlaneGeometry(window.innerWidth * 10, window.innerHeight * 10);
        var material = new THREE.MeshBasicMaterial( {color: 0xffff00, side: THREE.DoubleSide} );
        floor = new THREE.Mesh( geometry, material );
        waveformPath.setScene(scene);

        renderer = new THREE.WebGLRenderer({antialias: true});
        renderer.setClearColor(0xf0f0f0);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        container.addEventListener( 'mousedown', onMouseDown, false );
        container.addEventListener( 'mouseup', onMouseUp, false );
        container.addEventListener( 'mousemove', onMouseMove, false );
        container.addEventListener( 'touchstart', onTouchStart, false);
        container.addEventListener( 'touchmove', onTouchMove, false);
        container.addEventListener( 'touchend', onTouchEnd, false);
        window.addEventListener( 'resize', onWindowResize, false );

        context = new AudioContext();
        master = context.createGain();
        master.connect(context.destination);

        fileInput.addEventListener('change', function() {
          let reader = new FileReader();
          reader.onload = function(ev) {
            context.decodeAudioData(ev.target.result, function(buffer) {
              currentBuffer = buffer;
              data = buffer.getChannelData(0);
            });
          };
          reader.readAsArrayBuffer(this.files[0]);
        }, false);

        animate();
      }

      function drawWave(path){

        var wave = new THREE.Object3D();
        var rayWave = new THREE.Object3D();

        var span = 8;
        var ampScalar = 50;
        var depth = 0;
        var numberOfNodes = path.getLength() / 10 * Math.sqrt(camera.zoom);

        var step = Math.ceil( data.length / numberOfNodes );

        for( var i = 0; i < numberOfNodes-1; i++ ){
          var min = 1.0;
          var max = -1.0;

          for( j=0; j < step; j++) {
            var datum = data[(i*step)+j];
            if (datum < min){
              min = datum;
            }
            else if(datum > max){
              max = datum;
            }
          }

          var height = Math.max(5, (max-min)*ampScalar);

          var boxGeometry = new THREE.BoxBufferGeometry( depth, height, span );
          var boxMaterial = new THREE.MeshBasicMaterial({color: 0x00ccff});
          var block = new THREE.Mesh( boxGeometry, boxMaterial );
          block.index = i;
          block.position.copy(path.getPointAt(i * 1/numberOfNodes));
          block.lookAt(path.getPointAt((i +1) * 1/numberOfNodes));
          wave.add( block );
        }

        wave.buffer = currentBuffer;
        scene.add(wave);
      }

      function getScaledPointer(interactor){

        var pointer = new THREE.Vector2();
        pointer.set((interactor.clientX / window.innerWidth) * 2 - 1, - (interactor.clientY / window.innerHeight) * 2 + 1);
        return pointer;
      }

      function getInteractionPoint(scaledPointer){

        var raycaster = new THREE.Raycaster();
        raycaster.setFromCamera( scaledPointer, camera );

        var intersects = raycaster.intersectObject( floor );

        if(intersects.length > 0) {
            return intersects[0].point;
        }
      }

      function onWindowResize(){

        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      }

      function animate() {
        requestAnimationFrame( animate );
        render();
      }

      function render() {

        renderer.render(scene, camera);
      }

    </script>
    </div>
  </body>
</html>
